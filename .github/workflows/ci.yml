# Continuous integration: format, analyze, and test the CallBundle packages on
# pushes and pull requests targeting main.
#
# Resolution: the federated packages depend on each other via hosted `^x.y.z`
# constraints that may not be published yet, so `tool/wire_overrides.sh` writes
# local path `pubspec_overrides.yaml` files (gitignored, never published) before
# `flutter pub get`. This is deterministic and avoids melos's
# environment-specific override generation.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Wire local path overrides
        run: bash tool/wire_overrides.sh

      - name: Get dependencies
        run: |
          set -e
          for p in callbundle_platform_interface callbundle_android callbundle_ios callbundle example; do
            echo "::group::pub get $p"
            (cd "$p" && flutter pub get)
            echo "::endgroup::"
          done

      - name: Verify formatting
        run: |
          # Check the source we maintain; the auto-generated per-plugin example
          # apps are excluded as their boilerplate formatting varies by SDK patch.
          files=$(git ls-files '*.dart' | grep -vE '^callbundle_(android|ios)/example/')
          dart format --output=none --set-exit-if-changed $files

      - name: Analyze
        run: |
          set -e
          for p in callbundle_platform_interface callbundle_android callbundle_ios callbundle example; do
            echo "::group::analyze $p"
            (cd "$p" && flutter analyze)
            echo "::endgroup::"
          done

      - name: Test
        run: |
          set -e
          for p in callbundle_platform_interface callbundle_android callbundle_ios callbundle; do
            if [ -d "$p/test" ]; then
              echo "::group::test $p"
              (cd "$p" && flutter test)
              echo "::endgroup::"
            fi
          done

  build-android-example:
    name: Build Android example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Wire local path overrides
        run: bash tool/wire_overrides.sh

      - name: Build example APK (validates Android/Kotlin)
        working-directory: example
        run: flutter build apk --debug
